<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestor de Condomínios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .login-card h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-card h2 {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .login-card button:hover {
            background: #5a67d8;
        }

        .demo-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
            text-align: center;
        }

        .alert {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>🏢 Gestor de Condomínios</h1>
            <h2>Faça login para continuar</h2>

            {% if erro %}
            <div class="alert alert-error">{{ erro }}</div>
            {% endif %}

            <form method="POST">
                <input type="email" name="email" placeholder="Email" required autocomplete="off">
                <input type="password" name="senha" placeholder="Senha" required autocomplete="off">
                <button type="submit">Entrar</button>
            </form>

            <div class="demo-info">
                <p><strong>Credenciais de Demonstração:</strong></p>
                <p>📧 Master: master@condominio.com</p>
                <p>🔑 Senha: 123456</p>
            </div>
        </div>
    </div>
</body>
</html>
